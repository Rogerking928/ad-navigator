<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — AD Navigator</title>
<link rel="icon" href="/ad-navigator/favicon.svg" type="image/svg+xml">
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;
    font-family:"Inter","Noto Sans TC",system-ui,sans-serif;background:#f8f1ec;color:#3a2e2c;padding:24px;}
  .mark{width:64px;height:64px;border-radius:50%;margin:0 auto 22px;display:grid;place-items:center;
    background:radial-gradient(circle at 35% 30%,#d24b46,#b01f1f);color:#fff;font-weight:700;font-size:24px;
    border:2px solid #ddb888;font-family:Georgia,serif;}
  h1{font-family:"Source Serif 4","Noto Serif TC",Georgia,serif;color:#6e4a4a;font-size:26px;margin:0 0 10px;}
  p{color:#7a6863;margin:0 0 22px;}
  a{display:inline-block;background:#c79a6a;color:#fff;text-decoration:none;font-weight:600;
    padding:12px 26px;border-radius:6px;}
  a:hover{background:#a87b48;}
</style>
</head>
<body>
  <div>
    <div class="mark">AD</div>
    <h1>Page not found · 找不到頁面</h1>
    <p>The page you're looking for isn't here.<br>你要找的頁面不存在。</p>
